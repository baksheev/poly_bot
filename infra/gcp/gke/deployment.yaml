apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arb-bot-state
  namespace: arb-bot
  labels:
    app.kubernetes.io/name: arb-bot
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: dynamic-rwo
  resources:
    requests:
      storage: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arb-bot
  namespace: arb-bot
  labels:
    app.kubernetes.io/name: arb-bot
    app.kubernetes.io/component: trading-shadow
spec:
  replicas: 1
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 2100
  minReadySeconds: 20
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: arb-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arb-bot
        app.kubernetes.io/component: trading-shadow
        arb-bot/source-revision: __SOURCE_REVISION__
      annotations:
        arb-bot/source-revision: __SOURCE_REVISION__
    spec:
      serviceAccountName: arb-bot-runtime
      priorityClassName: arb-bot-critical
      terminationGracePeriodSeconds: 45
      nodeSelector:
        cloud.google.com/gke-nodepool: __NODE_POOL__
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: arb-bot
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              for secret_name in \
                CLICKHOUSE_URL \
                CLICKHOUSE_PASSWORD \
                ALCHEMY_WORLDCHAIN_RPC_URL \
                ALCHEMY_WORLDCHAIN_WS_URL \
                ALCHEMY_OPTIMISM_RPC_URL \
                BINANCE_API_KEY \
                BINANCE_SECRET_KEY \
                EVM_WALLET_PRIVATE_KEY; do
                secret_value="$(cat "/var/run/secrets/arb-bot/${secret_name}")"
                export "${secret_name}=${secret_value}"
              done
              export ENGINE_ID="arb-bot-rust-shadow-gke-${HOSTNAME}"
              exec arb_bot run
          envFrom:
            - configMapRef:
                name: arb-bot-runtime
          env:
            - name: REBALANCE_EXECUTION_MODE
              value: full_live
            - name: REBALANCE_MAX_WLD_AMOUNT
              value: "__REBALANCE_MAX_WLD_AMOUNT__"
            - name: REBALANCE_MAX_USDC_AMOUNT
              value: "__REBALANCE_MAX_USDC_AMOUNT__"
            - name: REBALANCE_LIVE_CONFIRMATION
              value: ENABLE_FULL_REBALANCE
            - name: REBALANCE_BINANCE_CREDENTIAL_MODE
              value: shared_trading
          resources:
            requests:
              cpu: "6"
              memory: 10Gi
            limits:
              cpu: "6"
              memory: 10Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            exec:
              command: ["/bin/sh", "-ec", "test -s /tmp/arb-bot-ready"]
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 360
          readinessProbe:
            exec:
              command: ["/bin/sh", "-ec", "test -s /tmp/arb-bot-ready"]
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          volumeMounts:
            - name: runtime-secrets
              mountPath: /var/run/secrets/arb-bot
              readOnly: true
            - name: runtime-tmp
              mountPath: /tmp
            - name: runtime-state
              mountPath: /var/lib/arb-bot
      volumes:
        - name: runtime-secrets
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: arb-bot-runtime
        - name: runtime-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: runtime-state
          persistentVolumeClaim:
            claimName: arb-bot-state
